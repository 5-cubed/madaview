name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Lets release.yml gate a tagged release on this same test suite.
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run e2e test-loop scenarios
        run: |
          set -e
          for scenario in */; do
            scenario="${scenario%/}"
            [ -x "$scenario/test" ] || continue
            echo "::group::e2e: $scenario"
            "./$scenario/test"
            echo "::endgroup::"
          done
        working-directory: e2e
